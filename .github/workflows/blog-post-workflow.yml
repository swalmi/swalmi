name: Latest blog post workflow
   on:
     schedule: [{cron: '0 * * * *'}]
     workflow_dispatch:
   jobs:
     update-readme-with-blog:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v3
         - uses: gautamkrishnar/blog-post-workflow@master
           with:
             feed_list: "https://medium.com/feed/@swalmi"
